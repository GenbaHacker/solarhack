<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>太陽光発電 提案ツール v2</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #1e3a5f;
  --accent2: #0f1e35;
  --warn: #ff8c42;
  --danger: #b03a2e;
  --bg: #f5f4f0;
  --surface: #fff;
  --border: #e2e0d8;
  --text: #1a1a18;
  --text2: #5a5a56;
}

body {
  font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 20px;
}

.container { max-width: 1200px; margin: 0 auto; }
.header {
  background: var(--accent);
  color: #fff;
  padding: 30px;
  border-radius: 8px;
  margin-bottom: 30px;
  text-align: center;
}
.header h1 { font-size: 28px; margin-bottom: 10px; }
.header p { font-size: 14px; opacity: 0.9; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 20px;
}

.card h2 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 15px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--accent);
}

.form-group {
  margin-bottom: 15px;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 5px;
  color: var(--text2);
}

.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  font-family: inherit;
}

.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(30, 58, 95, 0.1);
}

.form-row {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

.form-row.c3 {
  grid-template-columns: repeat(3, 1fr);
}

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.15s;
  font-family: inherit;
}

.btn.primary {
  background: var(--accent);
  color: #fff;
}

.btn.primary:hover {
  background: var(--accent2);
}

.btn.outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}

.btn.outline:hover {
  background: var(--bg);
}

.result {
  background: rgba(30, 58, 95, 0.05);
  border-left: 4px solid var(--accent);
  padding: 15px;
  border-radius: 6px;
  margin-top: 15px;
}

.result.warn {
  background: rgba(255, 140, 66, 0.05);
  border-left-color: var(--warn);
}

.result h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
}

.result p {
  font-size: 13px;
  line-height: 1.6;
  color: var(--text2);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  margin-top: 10px;
}

table th {
  background: rgba(0, 0, 0, 0.05);
  padding: 8px;
  text-align: left;
  font-weight: 600;
  border-bottom: 1px solid var(--border);
}

table td {
  padding: 8px;
  border-bottom: 1px solid var(--border);
}

.hidden { display: none !important; }
.loading { opacity: 0.6; pointer-events: none; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>☀️ 太陽光発電 提案ツール v2</h1>
    <p>ロジック共有版 - 計算エンジンはv1と同一</p>
  </div>

  <!-- === 案件情報 === -->
  <div class="card">
    <h2>📋 案件情報</h2>
    <div class="form-row">
      <div class="form-group">
        <label>顧客名</label>
        <input type="text" id="clientName" placeholder="例：山田太郎">
      </div>
      <div class="form-group">
        <label>住所</label>
        <input type="text" id="address" placeholder="例：東京都渋谷区">
      </div>
    </div>
    <div class="form-group">
      <label>備考</label>
      <textarea id="note" rows="3" placeholder="工事条件など"></textarea>
    </div>
  </div>

  <!-- === 設置場所（地図） === -->
  <div class="card">
    <h2>📍 設置場所</h2>
    <div style="display:flex;gap:10px;margin-bottom:10px">
      <input type="text" id="map-address" placeholder="例：広島県福山市（市区町村まで）"
        style="flex:1;padding:8px 12px;border-radius:6px;border:1px solid var(--border);font-size:13px">
      <button onclick="V2_searchAddress()"
        style="padding:8px 18px;background:var(--warn);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500">
        🔍 検索
      </button>
    </div>
    <div id="v2-map" style="height:350px;border-radius:var(--r);border:1px solid var(--border);background:#f0f0f0"></div>
    <div style="font-size:11px;color:var(--text3);margin-top:8px">
      💡 地図上をクリックして屋根の頂点を指定します
    </div>
    <div id="map-result" style="margin-top:8px;font-size:12px;color:var(--warn);min-height:20px"></div>
  </div>

  <!-- === パネル選択 === -->
  <div class="card">
    <h2>☀️ パネル選択</h2>
    <div class="form-row">
      <div class="form-group">
        <label>メーカー</label>
        <select id="panelMaker" onchange="C_buildPanelModels()">
          <option value="">選択してください</option>
        </select>
      </div>
      <div class="form-group">
        <label>型番</label>
        <select id="panelModel" onchange="C_applyPanel()">
          <option value="">選択してください</option>
        </select>
      </div>
    </div>
    <div class="form-row c3">
      <div class="form-group">
        <label>定格出力 (Wp)</label>
        <input type="number" id="panelWp" readonly>
      </div>
      <div class="form-group">
        <label>Voc (V)</label>
        <input type="number" id="panelVoc" readonly>
      </div>
      <div class="form-group">
        <label>Vmp (V)</label>
        <input type="number" id="panelVmp" readonly>
      </div>
    </div>
  </div>

  <!-- === PCS選択 === -->
  <div class="card">
    <h2>⚡ PCS選択</h2>
    <div class="form-row">
      <div class="form-group">
        <label>メーカー</label>
        <select id="pcsMaker" onchange="C_buildPcsModels()">
          <option value="">選択してください</option>
        </select>
      </div>
      <div class="form-group">
        <label>型番</label>
        <select id="pcsModel" onchange="C_applyPcs()">
          <option value="">選択してください</option>
        </select>
      </div>
    </div>
    <div class="form-row c3">
      <div class="form-group">
        <label>定格kW</label>
        <input type="number" id="pcsKw" readonly>
      </div>
      <div class="form-group">
        <label>MPPT範囲 (V)</label>
        <input type="text" id="pcsMpptRange" readonly placeholder="200-1000">
      </div>
      <div class="form-group">
        <label>最大入力電流 (A)</label>
        <input type="number" id="pcsImaxPerMppt" readonly>
      </div>
    </div>
  </div>

  <!-- === システム設計 === -->
  <div class="card">
    <h2>⚙️ システム設計</h2>
    <div class="form-group">
      <label>設置パネル枚数</label>
      <input type="number" id="totalPanels" value="20" min="1" onchange="C_calcString()">
    </div>
    <button class="btn primary" onclick="C_calcString()">計算実行</button>

    <div id="design-result" class="hidden">
      <div class="result">
        <h3>推奨文字列構成</h3>
        <p>直列: <strong id="opt-series">-</strong> 枚 × 並列: <strong id="opt-parallel">-</strong> = <strong id="panels-per-mppt">-</strong> パネル/MPPT</p>
        <p>PCS台数: <strong id="pcs-units">-</strong> 台</p>
        <p>DC/AC比: <strong id="dcac-ratio">-</strong></p>
      </div>

      <div id="safety-checks" class="result"></div>
    </div>
  </div>

  <!-- === シミュレーション === -->
  <div class="card">
    <h2>📊 発電シミュレーション</h2>
    <div class="form-group">
      <label>年間発電量 (kWh)</label>
      <input type="number" id="annualGen" readonly placeholder="-">
    </div>
    <div class="form-group">
      <label>年間経済効果 (万円)</label>
      <input type="number" id="annualBenefit" readonly placeholder="-">
    </div>
    <button class="btn primary" onclick="C_runSim()">シミュレーション実行</button>
  </div>

  <!-- === CF・IRR計算 === -->
  <div class="card">
    <h2>💰 CF・IRR計算</h2>
    <div class="form-row">
      <div class="form-group">
        <label>計算期間 (年)</label>
        <input type="number" id="cfYears" value="20" min="10" max="30">
      </div>
      <div class="form-group">
        <label>発電劣化率 (%/年)</label>
        <input type="number" id="degradeRate" value="0.5" min="0" step="0.1">
      </div>
    </div>
    <button class="btn primary" onclick="C_runCF()">計算実行</button>
    <div id="cf-result" class="hidden">
      <table>
        <thead>
          <tr>
            <th>年度</th>
            <th>発電量 (kWh)</th>
            <th>現在価値 (万円)</th>
            <th>累積CF (万円)</th>
          </tr>
        </thead>
        <tbody id="cf-tbody"></tbody>
      </table>
      <div class="result">
        <h3>計算結果</h3>
        <p>IRR: <strong id="irr-result">-</strong>%</p>
        <p>NPV: <strong id="npv-result">-</strong> 万円</p>
      </div>
    </div>
  </div>

</div>

<!-- === 計算ロジック === -->
<script>
'use strict';

const C_PANEL_DB = {
  longi:[

    {model:'YL600CF66i/2', wp:600, w:2274, h:1134, voc:50.80, vmp:42.70, isc:14.20, imp:14.10, tvoc:-0.280},
  ],
  das:[

const C_PCS_DB = {
  huawei:[
    {model:'SUN2000-4.95KTL-JPL1', kw:4.95,  vmax:600,  mpptMin:90,  mpptMax:560,  imaxPerMppt:16, mppt:4},
    {model:'SUN2000-20KTL-M3',     kw:20,    vmax:1100, mpptMin:200, mpptMax:1000, imaxPerMppt:14.5,mppt:6},
    {model:'SUN2000-33KTL-NH',     kw:33.3,  vmax:1100, mpptMin:200, mpptMax:1000, imaxPerMppt:22, mppt:5},
    {model:'SUN2000-40KTL-NH',     kw:40,    vmax:1100, mpptMin:200, mpptMax:1000, imaxPerMppt:22, mppt:5},
    {model:'SUN2000-50KTL-JPM0',   kw:50,    vmax:1100, mpptMin:200, mpptMax:1000, imaxPerMppt:26, mppt:8},
    {model:'SUN2000-50KTL-NHM3',   kw:50,    vmax:1100, mpptMin:200, mpptMax:1000, imaxPerMppt:30, mppt:8},
    {model:'SUN2000-111KTL-NHM0',  kw:111.1, vmax:1500, mpptMin:200, mpptMax:1300, imaxPerMppt:26, mppt:12},
    {model:'SUN2000-125KTL-JPH0',  kw:125,   vmax:1500, mpptMin:200, mpptMax:1300, imaxPerMppt:26, mppt:12},
  ],
  yasukawa:[
    {model:'CEPT-P3AA2025B（標準型）',  kw:25, vmax:1000, mpptMin:200, mpptMax:900, imaxPerMppt:25, mppt:4},
    {model:'CEPT-P3AB2025B（多機能型）',kw:25, vmax:1000, mpptMin:200, mpptMax:900, imaxPerMppt:25, mppt:4},
  ],
  omron:[
    {model:'KPW-A55-2PJ4', kw:5.5, vmax:600, mpptMin:100, mpptMax:550, imaxPerMppt:25, mppt:2},
    {model:'KPW-A55-2J4',  kw:5.5, vmax:600, mpptMin:100, mpptMax:550, imaxPerMppt:25, mppt:2},
  ],
  sungrow:[
    {model:'SG49.5CX-JP（10年）', kw:49.5, vmax:1100, mpptMin:200, mpptMax:1000, imaxPerMppt:30, mppt:12},
    {model:'SG100CX-JP（10年）',  kw:100,  vmax:1100, mpptMin:200, mpptMax:1000, imaxPerMppt:26, mppt:12},
    {model:'SG125HX-JP（10年）',  kw:125,  vmax:1500, mpptMin:200, mpptMax:1300, imaxPerMppt:26, mppt:16},
  ],
  solaredge:[
    {model:'SE17.5K-JPI（12年）', kw:17.5, vmax:1000, mpptMin:200, mpptMax:850, imaxPerMppt:30, mppt:2},
    {model:'SE33.3K-JPI（12年）', kw:33.3, vmax:1000, mpptMin:200, mpptMax:850, imaxPerMppt:30, mppt:2},
  ],
  panasonic:[
    {model:'VBPC255GM2', kw:5.5, vmax:600, mpptMin:100, mpptMax:550, imaxPerMppt:25, mppt:2},
    {model:'VBPC244GM2', kw:4.4, vmax:600, mpptMin:100, mpptMax:550, imaxPerMppt:25, mppt:2},
  ],
};

// ════════════════════════════════════════════════
// v2用ラッパー関数
// ════════════════════════════════════════════════

function gv(id) {
  return document.getElementById(id)?.value || '';
}

function sv(id, val) {
  const el = document.getElementById(id);
  if (el) el.value = val;
}

// ドロップダウン初期化（v2向け）
function C_initDropdowns() {
  const pmMaker = document.getElementById('panelMaker');
  const pcsMaker = document.getElementById('pcsMaker');

  Object.keys(C_PANEL_DB).forEach(maker => {
    const opt = document.createElement('option');
    opt.value = maker;
    opt.textContent = maker;
    pmMaker.appendChild(opt);
  });

  Object.keys(C_PCS_DB).forEach(maker => {
    const opt = document.createElement('option');
    opt.value = maker;
    opt.textContent = maker;
    pcsMaker.appendChild(opt);
  });
}

function C_buildPanelModels() {
  const maker = gv('panelMaker');
  const pmModel = document.getElementById('panelModel');
  pmModel.innerHTML = '<option value="">選択してください</option>';

  if (!maker || !C_PANEL_DB[maker]) return;

  C_PANEL_DB[maker].forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.model;
    opt.textContent = `${p.model} (${p.wp}Wp)`;
    pmModel.appendChild(opt);
  });
}

function C_applyPanel() {
  const maker = gv('panelMaker');
  const model = gv('panelModel');

  if (!maker || !C_PANEL_DB[maker]) return;
  const panel = C_PANEL_DB[maker].find(p => p.model === model);
  if (!panel) return;

  sv('panelWp', panel.wp);
  sv('panelVoc', panel.voc);
  sv('panelVmp', panel.vmp);
  sv('panelImp', panel.imp);
  sv('panelTvoc', panel.tvoc);
}

function C_buildPcsModels() {
  const maker = gv('pcsMaker');
  const pcsModel = document.getElementById('pcsModel');
  pcsModel.innerHTML = '<option value="">選択してください</option>';

  if (!maker || !C_PCS_DB[maker]) return;

  C_PCS_DB[maker].forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.model;
    opt.textContent = `${p.model} (${p.kw}kW)`;
    pcsModel.appendChild(opt);
  });
}

function C_applyPcs() {
  const maker = gv('pcsMaker');
  const model = gv('pcsModel');

  if (!maker || !C_PCS_DB[maker]) return;
  const pcs = C_PCS_DB[maker].find(p => p.model === model);
  if (!pcs) return;

  sv('pcsKw', pcs.kw);
  sv('pcsMpptRange', `${pcs.mpptMin}-${pcs.mpptMax}`);
  sv('pcsImaxPerMppt', pcs.imaxPerMppt);
  sv('pcsMpptCount', pcs.mppt);
}

function C_calcString() {
  const totalPanels = parseFloat(gv('totalPanels')) || 20;
  const panelWp = parseFloat(gv('panelWp')) || 485;
  const voc = parseFloat(gv('panelVoc')) || 40.4;
  const vmp = parseFloat(gv('panelVmp')) || 33.4;
  const tvoc = parseFloat(gv('panelTvoc')) || -0.2;
  const pcsKw = parseFloat(gv('pcsKw')) || 20;
  const vmax = 1000; // simplified

  const tLow = -15;
  const vocLow = voc * (1 + tvoc/100 * (tLow - 25));
  const maxS = Math.floor(vmax / vocLow);
  const optS = Math.floor(vmax / vmp);
  const maxPar = 2;

  const totalDcWp = totalPanels * panelWp;
  const dcacRatio = (totalDcWp / 1000 / pcsKw).toFixed(3);
  const units = Math.ceil(totalPanels / (optS * maxPar));

  sv('opt-series', optS);
  sv('opt-parallel', maxPar);
  sv('panels-per-mppt', optS * maxPar);
  sv('pcs-units', units);
  sv('dcac-ratio', dcacRatio);

  // 安全チェック
  const checks = [];
  checks.push(`<strong>低温時Voc:</strong> ${vocLow.toFixed(0)}V ${vocLow * optS <= vmax ? '✓' : '❌'}`);
  checks.push(`<strong>DC/AC比:</strong> ${dcacRatio} ${dcacRatio >= 0.8 && dcacRatio <= 2.0 ? '✓' : '⚠'}`);

  document.getElementById('safety-checks').innerHTML = checks.map(c => `<p>${c}</p>`).join('');
  document.getElementById('design-result').classList.remove('hidden');
}

function C_runSim() {
  const totalPanels = parseFloat(gv('totalPanels')) || 20;
  const panelWp = parseFloat(gv('panelWp')) || 485;
  const pcsKw = parseFloat(gv('pcsKw')) || 20;
  const annualGen = totalPanels * panelWp * 1.2; // simplified
  const annualBenefit = annualGen * 0.031 / 10000; // simplified

  sv('annualGen', Math.round(annualGen));
  sv('annualBenefit', annualBenefit.toFixed(1));
}

function C_runCF() {
  const years = parseFloat(gv('cfYears')) || 20;
  const annualGen = parseFloat(gv('annualGen')) || 10000;

  let html = '';
  let cumulativeCf = 0;
  for (let i = 1; i <= years; i++) {
    const gen = annualGen * Math.pow(0.995, i - 1);
    const cf = gen * 0.031 / 10000;
    cumulativeCf += cf;
    html += `<tr><td>${i}年目</td><td>${Math.round(gen)}</td><td>${cf.toFixed(2)}</td><td>${cumulativeCf.toFixed(2)}</td></tr>`;
  }
  document.getElementById('cf-tbody').innerHTML = html;
  document.getElementById('cf-result').classList.remove('hidden');
}

// ===== 地図関数 =====
let v2Map, v2MapPoints = [], v2MapMarkers = [], v2MapPoly = null;

function V2_initMap() {
  const el = document.getElementById('v2-map');
  if (!el) return;
  v2Map = L.map('v2-map').setView([34.5, 133.5], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'OpenStreetMap contributors'
  }).addTo(v2Map);
  v2Map.on('click', V2_addPoint);
}

async function V2_searchAddress() {
  const addr = document.getElementById('map-address').value.trim();
  if (!addr) { alert('住所を入力してください'); return; }
  try {
    const response = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(addr)}&format=json&limit=1&countrycodes=jp`
    );
    const geo = await response.json();
    if (!geo.length) { alert('住所が見つかりません'); return; }
    const lat = parseFloat(geo[0].lat);
    const lon = parseFloat(geo[0].lon);
    v2Map.setView([lat, lon], 17);
    document.getElementById('map-result').textContent = `✓ ${geo[0].address?.city || geo[0].display_name} (${lat.toFixed(4)}, ${lon.toFixed(4)})`;
  } catch(e) { alert('エラー: ' + e.message); }
}

function V2_addPoint(e) {
  if (!v2Map) return;
  v2MapPoints.push(e.latlng);
  const marker = L.circleMarker(e.latlng, {
    radius: 8, color: '#ff7c2a', fillColor: '#ff7c2a', fillOpacity: 0.9, weight: 2
  }).addTo(v2Map);
  v2MapMarkers.push(marker);

  if (v2MapPoints.length >= 3) {
    if (v2MapPoly) v2Map.removeLayer(v2MapPoly);
    v2MapPoly = L.polygon(v2MapPoints, {
      color: '#ff7c2a', fillColor: '#ff7c2a', fillOpacity: 0.2, weight: 2
    }).addTo(v2Map);
  }

  if (v2MapPoints.length === 4) {
    document.getElementById('map-result').textContent += ` → 4点確定。屋根面積計算準備完了`;
    v2MapPoints = [];
    v2MapMarkers = [];
    if (v2MapPoly) v2Map.removeLayer(v2MapPoly);
  }
}

// 初期化
window.addEventListener('load', function() {
  C_initDropdowns();
  if (document.getElementById('v2-map')) {
    setTimeout(V2_initMap, 100);
  }
});
</script>
